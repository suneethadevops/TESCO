<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - TESCO</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }
        nav {
            background-color: #005ea5;
            padding: 10px 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            font-size: 18px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .hero {
            background-color: #005ea5;
            color: white;
            padding: 50px 20px;
            text-align: center;
        }
        .hero h1 {
            font-size: 2.5em;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .cart-table {
            width: 100%;
            background-color: white;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        .cart-table th {
            background-color: #005ea5;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }
        .cart-table td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }
        .cart-table tr:last-child td {
            border-bottom: none;
        }
        .product-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
        }
        .cart-summary {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 400px;
            margin-left: auto;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .summary-row strong {
            color: #005ea5;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            color: #005ea5;
            border-top: 2px solid #ddd;
            padding-top: 15px;
        }
        .checkout-btn {
            background-color: #005ea5;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .checkout-btn:hover {
            background-color: #004080;
        }
        .empty-cart {
            text-align: center;
            padding: 40px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <nav>
        <img src="https://logos-world.net/wp-content/uploads/2020/11/Tesco-Logo.png" alt="TESCO Logo" style="height: 40px; vertical-align: middle; margin-right: 20px;">
        <a href="home.html">Home</a>
        <a href="cart.html">Cart</a>
        <a href="contactus.html">Contact Us</a>
    </nav>
    <div class="hero">
        <h1>Shopping Cart</h1>
        <p>Review and manage your shopping items</p>
    </div>
    <div class="container">
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="cart-table-body">
                <!-- Cart items will be populated by JavaScript -->
            </tbody>
        </table>
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal:</span>
                <strong id="subtotal">£29.47</strong>
            </div>
            <div class="summary-row">
                <span>Shipping:</span>
                <strong id="shipping">£3.00</strong>
            </div>
            <div class="summary-row">
                <span>Tax:</span>
                <strong id="tax">£6.47</strong>
            </div>
            <div class="total-row">
                <span>Total:</span>
                <span id="total">£38.94</span>
            </div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>
    <footer>
        &copy; 2026 TESCO. All rights reserved.
    </footer>
    <script src="product.js"></script>
    <script src="cart.js"></script>
    <script>
        // Initialize cart
        let shoppingCart = new ShoppingCart();

        // Load cart from localStorage or add sample items
        function initializeCart() {
            const savedCart = shoppingCart.loadCart();
            if (savedCart && savedCart.items.length > 0) {
                // Load saved items
                savedCart.items.forEach(item => {
                    const product = inventory.getProductById(item.productId);
                    if (product) {
                        shoppingCart.addItem(product, item.quantity);
                    }
                });
            } else {
                // Add sample items for demo
                const veg = inventory.getProductById(1);
                const milk = inventory.getProductById(2);
                const meat = inventory.getProductById(3);
                if (veg) shoppingCart.addItem(veg, 2);
                if (milk) shoppingCart.addItem(milk, 3);
                if (meat) shoppingCart.addItem(meat, 1);
            }
            displayCart();
        }

        // Display cart items
        function displayCart() {
            const tbody = document.getElementById('cart-table-body');
            tbody.innerHTML = '';

            shoppingCart.getItems().forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.product.name}</td>
                    <td>£${item.product.price.toFixed(2)}</td>
                    <td>
                        <button onclick="updateQuantity('${item.product.id}', ${item.quantity - 1})">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQuantity('${item.product.id}', ${item.quantity + 1})">+</button>
                    </td>
                    <td>£${item.getTotalPrice()}</td>
                `;
                tbody.appendChild(row);
            });

            updateSummary();
        }

        // Update item quantity
        function updateQuantity(productId, newQuantity) {
            if (newQuantity <= 0) {
                shoppingCart.removeItem(productId);
            } else {
                shoppingCart.updateItemQuantity(productId, newQuantity);
            }
            shoppingCart.saveCart();
            displayCart();
        }

        // Update cart summary
        function updateSummary() {
            const summary = shoppingCart.getSummary();
            document.getElementById('subtotal').textContent = `£${summary.subtotal}`;
            document.getElementById('shipping').textContent = `£${summary.shipCost}`;
            document.getElementById('tax').textContent = `£${summary.tax}`;
            document.getElementById('total').textContent = `£${summary.total}`;
        }

        // Initialize on page load
        window.onload = initializeCart;
    </script>
</body>
</html>
